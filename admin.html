<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Therapy Center</title>
    <link rel="stylesheet" href="style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--primary); color: white; }
        .del-btn { background: #e74c3c; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Patient Enquiries Dashboard</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Parent Name</th>
                    <th>Phone</th>
                    <th>Therapy</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
    </div>

    <script>
        // Fetch and display data
        async function loadData() {
            const res = await fetch('/api/admin/enquiries');
            const data = await res.json();
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const date = new Date(item.date).toLocaleDateString();
                tbody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td>${item.parentName}</td>
                        <td>${item.phone}</td>
                        <td>${item.therapy}</td>
                        <td><button class="del-btn" onclick="deleteEntry('${item._id}')">Delete</button></td>
                    </tr>
                `;
            });
        }

        async function deleteEntry(id) {
            if(confirm('Are you sure you want to delete this enquiry?')) {
                await fetch(`/api/admin/enquiries/${id}`, { method: 'DELETE' });
                loadData(); // Refresh table
            }
        }

        loadData();
    </script>
</body>
</html>
